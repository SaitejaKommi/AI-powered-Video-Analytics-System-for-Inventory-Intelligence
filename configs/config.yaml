# Configuration for AI-powered Smart Inventory Surveillance System

model:
  path: "models/yolov8/yolov8n.pt"  # Update this to models/yolov8/cement_bag_model/weights/best.pt after training
  confidence_threshold: 0.5         # Minimum confidence for detections

classes:
  allowed_classes: [0, 1]           # Class IDs to process (0: person, 1: cement_bag)
  names:
    0: "Person"
    1: "Cement Bag"

video:
  source: 0                         # Can be 0 for webcam, or a path to a video file
  display: true                     # Whether to display the video feed

training:
  data_yaml: "configs/dataset.yaml"
  epochs: 50
  batch_size: 16
  img_size: 640
  project_dir: "models/yolov8"
  name: "cement_bag_model"

tracking:
  track_thresh: 0.3         # ByteTrack threshold to maintain highly occluded tracks
  track_buffer: 60          # Frames to keep the ID alive during physical occlusion
  match_thresh: 0.8         # Geometrical IoU overlap tolerance

line_crossing:
  vector: [960, 0, 960, 2000] # Vertical screen splitting [x1, y1, x2, y2]

counting:
  target_class: "Person" # Change to "Cement Bag" later when in production

database:
  path: "data/inventory.db"

alerts:
  missing_frame_tolerance: 60  # Wait this many frames before triggering a missing object alert
  sudden_drop_threshold: 2     # Count drop > 'X' rapidly (reserved for future use)
